<!-- Sign Detail Modal — shared by dictionary.html and lesson_page.html
     Requires parent Alpine component to provide:
       - detailSign (object or null)
       - typeClass(type) function
       - formatPronunciation(pron) function
       - _modalTrap, _modalPrev (focus trap state)
     Optional (dictionary only):
       - fetchAndOpenDetail(code) for related sign navigation
       - selectCategory(code) for "browse category" action
-->
<div x-show="detailSign" x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
     x-effect="if (detailSign) { _modalPrev = document.activeElement; $nextTick(() => { const panel = $el.querySelector('[role=dialog]'); if (panel) { _modalTrap = window.createFocusTrap(panel); _modalTrap.activate(); panel.querySelector('button')?.focus(); } }); } else if (_modalTrap) { _modalTrap.deactivate(); _modalTrap = null; if (_modalPrev) { _modalPrev.focus(); _modalPrev = null; } }"
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @click.self="detailSign = null" @keydown.escape.window="detailSign = null">

    <div class="absolute inset-0 bg-night/80 backdrop-blur-sm"></div>

    <div x-show="detailSign"
         x-transition:enter="transition ease-out duration-200 delay-75"
         x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
         role="dialog" aria-modal="true" aria-label="{{ t('dictionary.sign_detail', lang) }}"
         class="relative bg-surface border border-border rounded-2xl max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto">

        <button @click="detailSign = null"
                aria-label="{{ t('common.close', lang) }}"
                class="absolute top-4 right-4 text-text-dim hover:text-text transition-colors z-10">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <template x-if="detailSign">
            <div>
                <!-- ── Hero zone ── -->
                <div class="relative text-center pt-8 pb-6 px-6 border-b border-border">
                    <div class="absolute inset-0 bg-gradient-to-b from-gold/5 to-transparent rounded-t-2xl"></div>
                    <div class="relative">
                        <div class="font-hieroglyph text-8xl text-gold mb-3 drop-shadow-[0_0_20px_rgba(212,175,55,0.3)]"
                             x-text="detailSign.unicode_char || detailSign.code"></div>
                        <div class="text-sm font-mono text-text-muted tracking-wider" dir="ltr" x-text="detailSign.code"></div>
                    </div>
                </div>

                <div class="p-6 space-y-5">

                    <!-- ── Primary identity ── -->
                    <!-- Phonetic signs: big transliteration + pronunciation + audio -->
                    <div x-show="detailSign.is_phonetic && detailSign.transliteration" class="text-center">
                        <div class="flex items-center justify-center gap-3 mb-1">
                            <span class="text-gold text-3xl font-bold tracking-wide" x-text="detailSign.transliteration"></span>
                            <button x-show="detailSign.speech_text" @click="speakSign(detailSign.speech_text, $el)"
                                    class="p-1.5 rounded-full bg-gold/10 hover:bg-gold/20 text-gold transition-colors" aria-label="{{ t('dictionary.listen_pronunciation', lang) }}">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                            </button>
                        </div>
                        <div x-show="detailSign.pronunciation" class="text-text-muted text-sm">
                            <span x-text="detailSign.pronunciation ? formatPronunciation(detailSign.pronunciation) : ''"></span>
                        </div>
                    </div>

                    <!-- Logograms: meaning front and center -->
                    <div x-show="detailSign.type === 'logogram' && detailSign.logographic_value" class="text-center">
                        <p class="text-xs text-text-dim uppercase tracking-wider mb-1">{{ t('dictionary.means', lang) }}</p>
                        <p class="text-green-400 text-2xl font-semibold" x-text="detailSign.logographic_value"></p>
                        <div x-show="detailSign.transliteration" class="mt-2 flex items-center justify-center gap-2">
                            <span class="text-text-muted text-sm">{{ t('dictionary.also_reads', lang) }}</span>
                            <span class="text-gold font-medium" x-text="detailSign.transliteration"></span>
                            <button x-show="detailSign.speech_text" @click="speakSign(detailSign.speech_text, $el)"
                                    class="p-1 rounded-full bg-gold/10 hover:bg-gold/20 text-gold transition-colors" aria-label="{{ t('dictionary.listen_pronunciation', lang) }}">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Determinatives: silent classifier callout -->
                    <div x-show="detailSign.type === 'determinative'"
                         class="bg-orange-500/10 border border-orange-500/20 rounded-xl p-4 text-center">
                        <div class="flex items-center justify-center gap-1.5 mb-2">
                            <svg class="w-4 h-4 text-orange-400/70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
                            <p class="text-xs text-orange-400/70 uppercase tracking-wider font-medium">{{ t('dictionary.silent_sign', lang) }}</p>
                        </div>
                        <p class="text-sm text-text-muted leading-relaxed mb-2">{{ t('dictionary.silent_desc', lang) }}</p>
                        <p x-show="detailSign.determinative_class" class="text-orange-400 text-lg font-semibold" x-text="detailSign.determinative_class"></p>
                    </div>

                    <!-- ── Info cards grid ── -->
                    <div class="grid grid-cols-2 gap-3">
                        <!-- Type -->
                        <div class="bg-night/50 border border-border rounded-lg p-3">
                            <p class="text-[11px] text-text-dim uppercase tracking-wider mb-1">{{ t('dictionary.type_label', lang) }}</p>
                            <span class="inline-block px-2 py-0.5 text-xs rounded-full font-medium" :class="typeClass(detailSign.type)" x-text="detailSign.type_name || detailSign.type"></span>
                        </div>
                        <!-- Category -->
                        <div class="bg-night/50 border border-border rounded-lg p-3">
                            <p class="text-[11px] text-text-dim uppercase tracking-wider mb-1">{{ t('dictionary.category_label', lang) }}</p>
                            <p class="text-sm"><span class="text-gold font-medium" x-text="detailSign.category"></span> <span class="text-text-muted" x-text="'\u00B7 ' + detailSign.category_name"></span></p>
                        </div>
                        <!-- Depicts -->
                        <div class="bg-night/50 border border-border rounded-lg p-3 col-span-2">
                            <p class="text-[11px] text-text-dim uppercase tracking-wider mb-1">{{ t('dictionary.depicts', lang) }}</p>
                            <p class="text-sm text-text leading-relaxed" x-text="detailSign.description"></p>
                        </div>
                        <!-- Also means (for non-logograms that have logographic value) -->
                        <template x-if="detailSign.type !== 'logogram' && detailSign.logographic_value">
                            <div class="bg-night/50 border border-border rounded-lg p-3 col-span-2">
                                <p class="text-[11px] text-text-dim uppercase tracking-wider mb-1">{{ t('dictionary.also_means', lang) }}</p>
                                <p class="text-sm text-text" x-text="detailSign.logographic_value"></p>
                            </div>
                        </template>
                    </div>

                    <!-- ── Fun fact ── -->
                    <div x-show="detailSign.fun_fact"
                         class="bg-gold/5 border border-gold/20 rounded-xl p-4">
                        <div class="flex gap-3">
                            <svg class="w-4 h-4 text-gold shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z"></path></svg>
                            <p class="text-sm text-text leading-relaxed" x-text="detailSign.fun_fact"></p>
                        </div>
                    </div>

                    <!-- ── Used in (example words — only shown when data available) ── -->
                    <div x-show="detailSign.example_usages && detailSign.example_usages.length > 0">
                        <p class="text-[11px] text-text-dim uppercase tracking-wider mb-2 flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5 text-gold/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                            {{ t('dictionary.used_in', lang) }}
                        </p>
                        <div class="space-y-2">
                            <template x-for="usage in detailSign.example_usages" :key="usage.transliteration">
                                <div class="bg-night/50 border border-border rounded-lg p-3 flex items-center gap-3">
                                    <span class="font-hieroglyph text-2xl text-gold shrink-0" x-text="usage.hieroglyphs"></span>
                                    <div class="min-w-0">
                                        <p class="text-sm text-gold/80 font-medium" x-text="usage.transliteration"></p>
                                        <p class="text-xs text-text-muted truncate" x-text="usage.translation"></p>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- ── See also (related signs — only shown when data + function available) ── -->
                    <div x-show="detailSign.related_signs && detailSign.related_signs.length > 0">
                        <p class="text-[11px] text-text-dim uppercase tracking-wider mb-2 flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5 text-gold/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                            {{ t('dictionary.see_also', lang) }}
                        </p>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="rel in detailSign.related_signs" :key="rel.code">
                                <button @click="typeof fetchAndOpenDetail === 'function' ? fetchAndOpenDetail(rel.code) : null"
                                        class="bg-night/50 border border-border hover:border-gold/30 rounded-lg px-3 py-2 flex items-center gap-2 transition-colors">
                                    <span class="font-hieroglyph text-xl text-gold" x-text="rel.unicode_char || rel.code"></span>
                                    <div class="text-left">
                                        <p class="text-xs font-mono text-text-muted" dir="ltr" x-text="rel.code"></p>
                                        <p class="text-[10px] text-text-dim truncate max-w-[80px]" x-text="rel.reading"></p>
                                    </div>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- ── Actions ── -->
                    <div class="flex items-center justify-center gap-3 pt-1">
                        <button x-show="detailSign.is_phonetic && typeof writeConvert === 'function'"
                                @click="writeInput = detailSign.code; tab = 'write'; writeConvert(); detailSign = null"
                                class="btn-ghost btn-sm flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            {{ t('dictionary.use_in_write', lang) }}
                        </button>
                        <a x-show="detailSign.is_phonetic && typeof writeConvert !== 'function'"
                           :href="'/write?glyph=' + detailSign.code" class="btn-ghost btn-sm flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            {{ t('dictionary.use_in_write', lang) }}
                        </a>
                        <button x-show="typeof selectCategory === 'function'" @click="selectCategory(detailSign.category); detailSign = null; tab = 'browse'"
                                class="btn-ghost btn-sm flex items-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            {{ t('dictionary.browse_category', lang) }}
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
