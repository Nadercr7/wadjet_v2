                <a href="/scan" class="px-4 py-2 rounded-lg text-sm text-text-muted hover:text-text hover:bg-surface-alt transition-all duration-200">Scan</a>
                <a href="/dictionary" class="px-4 py-2 rounded-lg text-sm text-text-muted hover:text-text hover:bg-surface-alt transition-all duration-200">Dictionary</a>

                <template x-if="$store.auth.user">
                    <div class="flex items-center gap-2" x-data="{ userMenu: false }">

                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>

        <div

            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150"
            x-transition:leave-start="opacity-100 translate-y-0"

            class="md:hidden pb-4 border-t border-border mt-2 pt-4"
            id="mobile-menu"
            role="menu"
        >
            <div class="flex flex-col gap-1">
                <a href="/hieroglyphs" class="px-4 py-3 rounded-lg text-sm text-text-muted hover:text-text hover:bg-surface-alt transition-all">Hieroglyphs</a>

                <a href="/explore" class="px-4 py-3 rounded-lg text-sm text-text-muted hover:text-text hover:bg-surface-alt transition-all pl-8">↳ Explore</a>

                        <div class="flex flex-col gap-2">
                            <button @click="$store.auth.showLogin = true; mobileMenu = false" class="btn-ghost w-full text-center">Sign In</button>
                            <button @click="$store.auth.showSignup = true; mobileMenu = false" class="btn-gold w-full text-center">Sign Up</button>
                        </div>
                    </template>
                    <template x-if="$store.auth.user">
                        <div class="flex flex-col gap-2">
                            <a href="/scan" class="btn-gold w-full text-center">Scan Now</a>
                            <button @click="$store.auth.logout(); mobileMenu = false" class="btn-ghost w-full text-center">Sign Out</button>
                        </div>
                    </template>
                </div>
            </div>
        </div>

    [x-cloak] { display: none !important; }
