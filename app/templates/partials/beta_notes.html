<!-- Beta Notes System — contextual tips & beta banner -->
<!-- Alpine component: manages all note visibility via localStorage flags -->
<div x-data="betaNotes()" x-cloak>

    <!-- ═══════════════════════════════════════════
         1. Beta Welcome Banner (landing page only)
         Typewriter-style message, shows once per user
         ═══════════════════════════════════════════ -->
    <template x-if="showBeta">
        <div class="fixed top-4 left-1/2 -translate-x-1/2 z-[9980] w-[calc(100%-2rem)] max-w-lg note-enter"
             role="status" aria-live="polite">
            <div class="beta-banner px-5 py-4 flex flex-col gap-3">
                <!-- Header row -->
                <div class="flex items-center justify-between gap-3">
                    <div class="flex items-center gap-2">
                        <span class="text-gold text-lg font-hieroglyph" aria-hidden="true">𓂋</span>
                        <span class="text-gold font-display font-bold text-sm">{{ t('notes.beta_welcome', lang) }}</span>
                        <span class="badge-gold text-[10px] uppercase tracking-wider">{{ t('nav.badge_beta', lang) }}</span>
                    </div>
                    <button @click="dismissBeta()" class="text-text-dim hover:text-gold transition-colors shrink-0" :aria-label="'{{ t('notes.beta_dismiss', lang) }}'">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <!-- Typewriter message -->
                <p class="text-sm text-ivory/90 leading-relaxed">
                    <span x-ref="typewriterText"></span><span class="beta-banner-cursor" x-show="typing" x-cloak></span>
                </p>
                <!-- CTA row -->
                <div class="flex items-center gap-3" x-show="!typing" x-transition>
                    <button @click="openFeedback()" class="btn-gold btn-sm text-xs">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        {{ t('notes.beta_cta', lang) }}
                    </button>
                    <button @click="dismissBeta()" class="text-xs text-text-dim hover:text-gold transition-colors">{{ t('notes.beta_dismiss', lang) }}</button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══════════════════════════════════════════
         2. Audio Loading Note
         Shown first time audio is triggered anywhere
         ═══════════════════════════════════════════ -->
    <template x-if="showAudioNote">
        <div class="fixed top-4 right-6 rtl:right-auto rtl:left-6 z-[9979] max-w-xs note-enter"
             role="status" aria-live="polite">
            <div class="audio-note px-4 py-3 flex items-start gap-3">
                <div class="w-8 h-8 rounded-lg bg-gold/10 flex items-center justify-center shrink-0 mt-0.5">
                    <svg class="w-4 h-4 text-gold animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M17.95 6.05a8 8 0 010 11.9M11 5L6 9H2v6h4l5 4V5z"/>
                    </svg>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs text-ivory/80 leading-relaxed">{{ t('notes.audio_loading', lang) }}</p>
                </div>
                <button @click="dismissAudioNote()" class="text-text-dim hover:text-gold transition-colors shrink-0 mt-0.5" :aria-label="'{{ t('notes.audio_dismiss', lang) }}'">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
    </template>

    <!-- ═══════════════════════════════════════════
         3. Page-specific contextual tips
         Fixed bottom-center banner, shows once per page per user
         ═══════════════════════════════════════════ -->
    <template x-if="pageTip">
        <div class="fixed bottom-20 left-1/2 -translate-x-1/2 z-[9978] w-[calc(100%-2rem)] max-w-md note-enter"
             :class="tipHiding ? 'opacity-0 translate-y-4 transition-all duration-300' : 'transition-all duration-300'"
             role="note" aria-live="polite">
            <div class="tip-note px-4 py-3">
                <div class="flex items-start gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gold/10 flex items-center justify-center shrink-0 mt-0.5">
                        <svg class="w-4 h-4 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-semibold text-gold mb-0.5" x-text="pageTip.title"></p>
                        <p class="text-xs text-ivory/80 leading-relaxed" x-text="pageTip.message"></p>
                    </div>
                    <button @click="dismissPageTip()" class="text-text-dim hover:text-gold transition-colors shrink-0 mt-0.5" :aria-label="'{{ t('notes.dismiss', lang) }}'">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ═══════════════════════════════════════════
         4. Feedback arrow pointer
         Points down toward the feedback FAB button
         ═══════════════════════════════════════════ -->
    <template x-if="showFeedbackArrow">
        <div class="fixed z-[9985] note-enter"
             :class="isRtl ? 'bottom-[5.25rem] right-[0.625rem]' : 'bottom-[5.25rem] left-[0.625rem]'">
            <div class="note-pointer">
                <span class="note-pointer-label" x-text="pointerLabels.feedback"></span>
                <svg class="w-4 h-4 text-gold note-pointer-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                </svg>
            </div>
        </div>
    </template>

    <!-- ═══════════════════════════════════════════
         5. Narration arrow pointer
         Points down toward the narration/audio button
         ═══════════════════════════════════════════ -->
    <template x-if="showNarrationArrow">
        <div class="fixed z-[9985] note-enter"
             :class="isRtl ? 'bottom-[9.75rem] left-[0.375rem]' : 'bottom-[9.75rem] right-[0.375rem]'">
            <div class="note-pointer">
                <span class="note-pointer-label" x-text="pointerLabels.narration"></span>
                <svg class="w-4 h-4 text-gold note-pointer-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                </svg>
            </div>
        </div>
    </template>

</div>

<script>
function betaNotes() {
    var lang = document.documentElement.lang || 'en';
    var isAr = lang === 'ar';

    // i18n map for tips — keyed by page_name template var
    var tipStrings = {
        scan: {
            title: isAr ? '{{ t("notes.scan_tip_title", "ar") }}' : '{{ t("notes.scan_tip_title", "en") }}',
            message: isAr ? '{{ t("notes.scan_tip", "ar") }}' : '{{ t("notes.scan_tip", "en") }}'
        },
        chat: {
            title: isAr ? '{{ t("notes.chat_tip_title", "ar") }}' : '{{ t("notes.chat_tip_title", "en") }}',
            message: isAr ? '{{ t("notes.chat_tip", "ar") }}' : '{{ t("notes.chat_tip", "en") }}'
        },
        stories: {
            title: isAr ? '{{ t("notes.story_narration_tip_title", "ar") }}' : '{{ t("notes.story_narration_tip_title", "en") }}',
            message: isAr ? '{{ t("notes.story_narration_tip", "ar") }}' : '{{ t("notes.story_narration_tip", "en") }}'
        },
        dictionary: {
            title: isAr ? '{{ t("notes.dict_tip_title", "ar") }}' : '{{ t("notes.dict_tip_title", "en") }}',
            message: isAr ? '{{ t("notes.dict_tip", "ar") }}' : '{{ t("notes.dict_tip", "en") }}'
        },
        explore: {
            title: isAr ? '{{ t("notes.explore_tip_title", "ar") }}' : '{{ t("notes.explore_tip_title", "en") }}',
            message: isAr ? '{{ t("notes.explore_tip", "ar") }}' : '{{ t("notes.explore_tip", "en") }}'
        },
        write: {
            title: isAr ? '{{ t("notes.write_tip_title", "ar") }}' : '{{ t("notes.write_tip_title", "en") }}',
            message: isAr ? '{{ t("notes.write_tip", "ar") }}' : '{{ t("notes.write_tip", "en") }}'
        },
        hieroglyphs: {
            title: isAr ? '{{ t("notes.hieroglyphs_tip_title", "ar") }}' : '{{ t("notes.hieroglyphs_tip_title", "en") }}',
            message: isAr ? '{{ t("notes.hieroglyphs_tip", "ar") }}' : '{{ t("notes.hieroglyphs_tip", "en") }}'
        },
        landmarks: {
            title: isAr ? '{{ t("notes.landmarks_tip_title", "ar") }}' : '{{ t("notes.landmarks_tip_title", "en") }}',
            message: isAr ? '{{ t("notes.landmarks_tip", "ar") }}' : '{{ t("notes.landmarks_tip", "en") }}'
        },
        dashboard: {
            title: isAr ? '{{ t("notes.dashboard_tip_title", "ar") }}' : '{{ t("notes.dashboard_tip_title", "en") }}',
            message: isAr ? '{{ t("notes.dashboard_tip", "ar") }}' : '{{ t("notes.dashboard_tip", "en") }}'
        }
    };

    // Pointer label strings
    var pointerLabels = {
        feedback: isAr ? '{{ t("notes.feedback_pointer", "ar") }}' : '{{ t("notes.feedback_pointer", "en") }}',
        narration: isAr ? '{{ t("notes.narration_pointer", "ar") }}' : '{{ t("notes.narration_pointer", "en") }}'
    };

    // Determine current page from body data or URL
    var pageName = '{{ page_name|default("") }}';

    var betaMessage = isAr
        ? (pageName === 'welcome' ? '{{ t("notes.welcome_typing", "ar") }}' : '{{ t("notes.beta_typing", "ar") }}')
        : (pageName === 'welcome' ? '{{ t("notes.welcome_typing", "en") }}' : '{{ t("notes.beta_typing", "en") }}');

    // Pages where narration button lives (at bottom-20)
    var narrationArrowPages = ['dictionary', 'explore'];

    return {
        showBeta: false,
        showAudioNote: false,
        pageTip: null,
        tipHiding: false,
        typing: false,
        showFeedbackArrow: false,
        showNarrationArrow: false,
        isRtl: isAr,
        pointerLabels: pointerLabels,
        _typeTimer: null,

        init() {
            var self = this;

            // 1. Beta banner — show on landing AND welcome page if not dismissed
            if ((pageName === 'home' || pageName === 'landing' || pageName === 'welcome') && !localStorage.getItem('wadjet_beta_dismissed')) {
                setTimeout(function() { self.showBeta = true; self.showFeedbackArrow = true; self.startTypewriter(); }, 1500);
            }

            // 2. Audio note — listen for first audio trigger
            if (!localStorage.getItem('wadjet_audio_note_seen')) {
                self._audioListener = function() {
                    if (!self.showAudioNote && !localStorage.getItem('wadjet_audio_note_seen')) {
                        self.showAudioNote = true;
                        // Auto-dismiss after 6 seconds
                        setTimeout(function() { self.dismissAudioNote(); }, 6000);
                    }
                };
                document.addEventListener('wadjet:audio-loading', self._audioListener);
            }

            // 3. Page-specific tip
            if (pageName && tipStrings[pageName]) {
                var tipKey = 'wadjet_tip_' + pageName;
                if (!localStorage.getItem(tipKey)) {
                    self.pageTip = tipStrings[pageName];
                    // Auto-dismiss after 10 seconds
                    setTimeout(function() { if (self.pageTip) self.dismissPageTip(); }, 10000);
                    // Show narration arrow on pages with narration button
                    if (narrationArrowPages.indexOf(pageName) >= 0) {
                        self.showNarrationArrow = true;
                    }
                }
            }
        },

        startTypewriter() {
            var self = this;
            self.typing = true;
            var text = betaMessage;
            var i = 0;
            var el = null;

            // Wait for next tick for x-ref
            self.$nextTick(function() {
                el = self.$refs.typewriterText;
                if (!el) { self.typing = false; return; }
                el.textContent = '';

                self._typeTimer = setInterval(function() {
                    if (i < text.length) {
                        el.textContent += text.charAt(i);
                        i++;
                    } else {
                        clearInterval(self._typeTimer);
                        self.typing = false;
                    }
                }, 30); // 30ms per character
            });
        },

        dismissBeta() {
            this.showBeta = false;
            this.showFeedbackArrow = false;
            localStorage.setItem('wadjet_beta_dismissed', '1');
            if (this._typeTimer) clearInterval(this._typeTimer);
        },

        openFeedback() {
            this.dismissBeta();
            // Find and click the feedback FAB
            var fab = document.querySelector('[x-data="feedbackApp()"] button');
            if (fab) fab.click();
        },

        dismissAudioNote() {
            this.showAudioNote = false;
            localStorage.setItem('wadjet_audio_note_seen', '1');
            if (this._audioListener) {
                document.removeEventListener('wadjet:audio-loading', this._audioListener);
            }
        },

        dismissPageTip() {
            var self = this;
            self.tipHiding = true;
            self.showNarrationArrow = false;
            setTimeout(function() {
                self.pageTip = null;
                self.tipHiding = false;
                if (pageName) localStorage.setItem('wadjet_tip_' + pageName, '1');
            }, 300);
        },

        destroy() {
            if (this._typeTimer) clearInterval(this._typeTimer);
            if (this._audioListener) {
                document.removeEventListener('wadjet:audio-loading', this._audioListener);
            }
        }
    };
}
</script>
