<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wadjet{% endblock %} — Egyptian Heritage AI</title>
    <meta name="description" content="{% block description %}AI-powered Egyptian heritage app — scan hieroglyphs, translate inscriptions, explore landmarks{% endblock %}">
    <meta name="view-transition" content="same-origin">
    <link rel="icon" href="/favicon.ico" type="image/svg+xml">

    <!-- DNS prefetch for Google Fonts -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Styles (critical) -->
    <link rel="stylesheet" href="/static/dist/styles.css?v=21" fetchpriority="high">
    <link rel="stylesheet" href="/static/css/atropos.css">

    {% block head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col" x-data="{ mobileMenu: false }">

    <!-- Skip to content (accessibility) -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[10000] focus:bg-gold focus:text-night focus:px-4 focus:py-2 focus:rounded-lg focus:text-sm focus:font-medium">Skip to content</a>

    <!-- Page loading progress bar -->
    <div id="page-loader" class="fixed top-0 left-0 w-0 h-0.5 bg-gold z-[9999] transition-all duration-300"
         style="box-shadow: 0 0 10px rgba(212,175,55,0.5)" role="progressbar" aria-hidden="true"></div>

    <!-- Navigation -->
    {% include "partials/nav.html" %}

    <!-- Main Content -->
    <main class="flex-1" id="main-content" role="main">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include "partials/footer.html" %}

    <!-- Toast notification -->
    <div x-data x-show="$store.toast.visible"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4"
         class="fixed bottom-6 right-6 z-[9998] max-w-sm"
         role="alert" aria-live="assertive" aria-atomic="true"
         x-cloak>
        <div class="rounded-lg px-4 py-3 shadow-lg border flex items-center gap-3 text-sm"
             :class="{
                 'bg-surface border-success/30 text-success': $store.toast.type === 'success',
                 'bg-surface border-error/30 text-error': $store.toast.type === 'error',
                 'bg-surface border-gold/30 text-gold': $store.toast.type === 'info'
             }">
            <!-- Icon -->
            <svg x-show="$store.toast.type === 'success'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            <svg x-show="$store.toast.type === 'error'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <svg x-show="$store.toast.type === 'info'" class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span x-text="$store.toast.message"></span>
            <button @click="$store.toast.visible = false" class="ml-auto text-text-dim hover:text-text">&times;</button>
        </div>
    </div>

    <!-- Vendor scripts (self-hosted for offline support) -->
    <script src="/static/vendor/atropos.min.js" defer></script>
    <script src="/static/vendor/gsap.min.js" defer></script>
    <script src="/static/vendor/scrolltrigger.min.js" defer></script>
    <script src="/static/vendor/lenis.min.js" defer></script>
    <script src="/static/vendor/alpine.min.js" defer></script>
    <script src="/static/vendor/htmx.min.js" defer></script>

    <!-- App JS -->
    <script src="/static/js/tts.js?v=1"></script>
    <script src="/static/js/app.js?v=21"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
