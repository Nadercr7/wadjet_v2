services:
  - type: web
    name: wadjet-v2
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && npx @tailwindcss/cli -i app/static/css/input.css -o app/static/dist/styles.css --minify
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: NODE_VERSION
        value: "22"
      - key: ENVIRONMENT
        value: production
      - key: GEMINI_API_KEYS
        sync: false
    healthCheckPath: /api/health
    autoDeploy: false
