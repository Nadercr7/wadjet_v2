services:
  - type: web
    name: wadjet-v3
    runtime: python
    plan: free
    buildCommand: npm install && npx @tailwindcss/cli -i app/static/css/input.css -o app/static/dist/styles.css --minify && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: NODE_VERSION
        value: "22"
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TRUSTED_PROXY_DEPTH
        value: "1"
      - key: GEMINI_API_KEYS
        sync: false
      - key: GROK_API_KEYS
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: BASE_URL
        value: "https://wadjet-v3.onrender.com"
    healthCheckPath: /api/health
    autoDeploy: false
